name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Create .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"."}' > .clasp.json

      - name: Prepare extension-less files for GAS
        run: |
          for f in css js dashboard sidebar; do
            [ -f "$f" ] && cp "$f" "${f}.html"
          done

      - name: Push to Google Apps Script
        run: clasp push --force

      - name: Deploy (siempre al mismo deployment fijo = la URL en producción)
        env:
          # ID del deployment que corresponde a la URL /exec que usa el equipo.
          # Usar -i actualiza ESE deployment EN EL SITIO: misma URL, no crea uno
          # nuevo ni cuenta contra el límite de 20.
          DEPLOY_ID: AKfycbxEb7qw-J7jhEIVLGa264UHq4up_EZ3oW0QpgXrbyRzneQq4qYrlY5G761cn4YLcxlD4A
        run: |
          set -e
          clasp deploy -i "$DEPLOY_ID" --description "Auto-deploy desde GitHub Actions"

      - name: Limpiar deployments viejos (deja solo el fijo + @HEAD)
        env:
          DEPLOY_ID: AKfycbxEb7qw-J7jhEIVLGa264UHq4up_EZ3oW0QpgXrbyRzneQq4qYrlY5G761cn4YLcxlD4A
        run: |
          set -e
          LIST=$(clasp deployments || true)
          echo "$LIST"
          # Borra cada deployment versionado (@n) que NO sea el fijo. El @HEAD
          # no se toca (es la URL /dev y no cuenta contra el límite de 20).
          echo "$LIST" | grep -E '@[0-9]+' | awk '{print $2}' | while read -r ID; do
            if [ -n "$ID" ] && [ "$ID" != "$DEPLOY_ID" ]; then
              echo "Eliminando deployment viejo $ID"
              clasp undeploy "$ID" || true
            fi
          done
