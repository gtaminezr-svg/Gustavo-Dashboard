name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Create .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"."}' > .clasp.json

      - name: Prepare extension-less files for GAS
        run: |
          for f in css js dashboard sidebar; do
            [ -f "$f" ] && cp "$f" "${f}.html"
          done

      - name: Push to Google Apps Script
        run: clasp push --force

      - name: Deploy (reuse existing deployment, fall back to new)
        run: |
          set -e
          LIST=$(clasp deployments || true)
          echo "$LIST"
          # Reutiliza el deployment versionado más reciente (mayor @n; excluye @HEAD).
          # Usar -i actualiza ese deployment EN EL SITIO: no crea uno nuevo ni cuenta
          # contra el límite de 20, y conserva la misma URL.
          TARGET=$(echo "$LIST" | grep -E '@[0-9]+' | sed -E 's/^- ([^ ]+) @([0-9]+).*/\2 \1/' | sort -rn | head -1 | awk '{print $2}' || true)
          if [ -n "$TARGET" ]; then
            echo "Reutilizando deployment $TARGET"
            clasp deploy -i "$TARGET" --description "Auto-deploy desde GitHub Actions"
          else
            clasp deploy --description "Auto-deploy desde GitHub Actions"
          fi
