name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Create .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"."}' > .clasp.json

      - name: Prepare extension-less files for GAS
        run: |
          for f in css js dashboard sidebar; do
            [ -f "$f" ] && cp "$f" "${f}.html"
          done

      - name: Push to Google Apps Script
        run: clasp push --force

      - name: Deploy new version
        run: clasp deploy --description "Auto-deploy desde GitHub Actions"
